<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بکنگ پورٹل - جامع مسجد گلزارِ مدینہ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #b22222;
            --gold: #d4af37;
            --bg: #f8f9fa;
        }
        body { background-color: var(--bg); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333; }
        
        /* Premium Header */
        .hero-section {
            background: linear-gradient(rgba(178, 34, 34, 0.9), rgba(178, 34, 34, 0.9)), url('https://www.transparenttextures.com/patterns/arabesque.png');
            color: white; padding: 60px 0; border-bottom: 6px solid var(--gold); text-align: center;
        }

        .price-badge {
            background: white; border: 4px solid var(--gold); border-radius: 50%;
            width: 150px; height: 150px; margin: -75px auto 20px;
            display: flex; flex-direction: column; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); color: var(--primary);
        }

        /* Cow Visualization */
        .cow-card {
            background: white; border-radius: 20px; border: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); margin-bottom: 25px; overflow: hidden;
        }
        .cow-header { background: var(--primary); color: white; padding: 15px; font-weight: bold; font-size: 1.2rem; }
        .slot-container { padding: 20px; display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .slot {
            aspect-ratio: 1; border-radius: 10px; background: #eee;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            transition: all 0.3s; border: 2px solid transparent;
        }
        .slot.booked { background: #fff3cd; border-color: #ffc107; color: #856404; }
        .slot.paid { background: #d4edda; border-color: #28a745; color: #155724; transform: scale(1.05); }

        /* Admin UI */
        .admin-terminal {
            background: #1e1e1e; color: #00ff00; padding: 15px;
            border-radius: 10px; font-family: 'Courier New', Courier, monospace;
            font-size: 13px; height: 200px; overflow-y: auto;
        }
        .btn-gold { background-color: var(--gold); color: white; border: none; }
        .btn-gold:hover { background-color: #c49a2d; color: white; }
    </style>
</head>
<body>

<div class="hero-section">
    <div class="container">
        <h1 class="display-4 fw-bold">اجتماعی قربانی ۲۰۲۶</h1>
        <p class="lead">جامع مسجد گلزارِ مدینہ، ڈی-1، ٹاؤن شپ لاہور</p>
    </div>
</div>

<div class="container pb-5">
    <div class="price-badge text-center">
        <span class="small">فی حصہ</span>
        <h2 class="fw-bold m-0">33,500</h2>
        <span class="small">روپے</span>
    </div>

    <div class="row g-4 mt-2">
        <div class="col-lg-5">
            <div class="cow-card p-4">
                <h3 class="text-danger mb-4"><i class="fas fa-file-signature me-2"></i> رجسٹریشن فارم</h3>
                <div class="mb-3">
                    <label class="form-label">نامِ مبارک</label>
                    <input type="text" id="name" class="form-control form-control-lg" placeholder="اپنا پورا نام لکھیں">
                </div>
                <div class="mb-3">
                    <label class="form-label">موبائل نمبر (واٹس ایپ)</label>
                    <input type="text" id="phone" class="form-control form-control-lg" placeholder="03XXXXXXXXX">
                </div>
                <div class="mb-4">
                    <label class="form-label">کتنے حصے بک کرنے ہیں؟</label>
                    <select id="qty" class="form-select form-select-lg">
                        <option value="1">01 حصہ</option>
                        <option value="2">02 حصے</option>
                        <option value="7">پوری گائے (07 حصے)</option>
                    </select>
                </div>
                <button onclick="makeBooking()" class="btn btn-danger btn-lg w-100 shadow">
                    بکنگ کنفرم کریں <i class="fas fa-check-circle ms-2"></i>
                </button>
                
                <div class="mt-4 p-3 bg-light rounded-3 text-center">
                    <p class="small mb-2"><strong>پیمنٹ کے طریقے (Manual):</strong></p>
                    <div class="d-flex justify-content-around">
                        <span><i class="fas fa-mobile-alt text-success"></i> جاز کیش</span>
                        <span><i class="fas fa-university text-primary"></i> ایزی پیسہ</span>
                    </div>
                    <p class="mt-2 fw-bold mb-0">03054706716</p>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <h3 class="mb-4"><i class="fas fa-chart-line me-2"></i> لائیو صورتحال</h3>
            <div id="cowsList">
                </div>
        </div>
    </div>

    <hr class="my-5">

    <div class="text-center">
        <button onclick="loginAdmin()" class="btn btn-dark btn-sm rounded-pill px-4">
            <i class="fas fa-user-shield me-1"></i> ایڈمن ڈیش بورڈ
        </button>
    </div>

    <div id="adminPanel" class="mt-4" style="display: none;">
        <div class="row">
            <div class="col-md-8">
                <div class="cow-card">
                    <div class="cow-header d-flex justify-content-between align-items-center">
                        <span>ایڈمن کنٹرول لسٹ</span>
                        <button class="btn btn-sm btn-light" onclick="clearData()">Clear All Data</button>
                    </div>
                    <div class="table-responsive p-3">
                        <table class="table align-middle">
                            <thead>
                                <tr>
                                    <th>نام</th>
                                    <th>رابطہ</th>
                                    <th>حصے</th>
                                    <th>ایکشن</th>
                                </tr>
                            </thead>
                            <tbody id="adminTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <h5 class="mb-3">سسٹم لاگز (Back-end)</h5>
                <div class="admin-terminal" id="terminal">
                    > System ready...
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let bookings = JSON.parse(localStorage.getItem('qurbani_gold_db')) || [];

    function makeBooking() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const qty = parseInt(document.getElementById('qty').value);

        if(!name || !phone) return alert("براہ کرم تمام معلومات درج کریں");

        const newEntry = { id: Date.now(), name, phone, qty, status: 'booked' };
        bookings.push(newEntry);
        updateDB();
        addLog(`SUCCESS: New booking from ${name} for ${qty} share(s)`);
        alert("شکریہ! آپ کی بکنگ درج ہوگئی ہے۔ پیمنٹ تصدیق ہونے پر سٹیٹس گرین ہو جائے گا۔");
        
        document.getElementById('name').value = "";
        document.getElementById('phone').value = "";
    }

    function confirmPaid(id) {
        bookings = bookings.map(b => {
            if(b.id === id) {
                b.status = 'paid';
                addLog(`CMD: Payment confirmed for ID ${id}`);
            }
            return b;
        });
        updateDB();
    }

    function loginAdmin() {
        const p = prompt("پاس ورڈ درج کریں:");
        if(p === "masjid123") {
            document.getElementById('adminPanel').style.display = 'block';
            addLog("AUTH: Admin login successful");
        } else {
            alert("غلط پاس ورڈ!");
        }
    }

    function addLog(msg) {
        const t = document.getElementById('terminal');
        t.innerHTML += `<br>> [${new Date().toLocaleTimeString()}] ${msg}`;
        t.scrollTop = t.scrollHeight;
    }

    function updateDB() {
        localStorage.setItem('qurbani_gold_db', JSON.stringify(bookings));
        render();
    }

    function clearData() {
        if(confirm("کیا آپ واقعی سارا ڈیٹا ختم کرنا چاہتے ہیں؟")) {
            bookings = [];
            updateDB();
            addLog("SYSTEM: All data wiped");
        }
    }

    function render() {
        // Cow Logic
        let totalBooked = bookings.reduce((s, b) => s + b.qty, 0);
        let totalPaid = bookings.reduce((s, b) => s + (b.status === 'paid' ? b.qty : 0), 0);
        
        let cowCount = Math.ceil(Math.max(totalBooked + 1, 7) / 7);
        let html = "";
        for(let i=1; i<=cowCount; i++) {
            let slotsHtml = "";
            for(let j=1; j<=7; j++) {
                let pos = (i-1)*7 + j;
                let state = "";
                if(pos <= totalPaid) state = "paid";
                else if(pos <= totalBooked) state = "booked";
                slotsHtml += `<div class="slot ${state}">${pos}</div>`;
            }
            let fullLabel = totalBooked >= i*7 ? '<span class="badge bg-success ms-2">مکمل</span>' : '';
            html += `
                <div class="cow-card">
                    <div class="cow-header">گائے نمبر ${i} ${fullLabel}</div>
                    <div class="slot-container">${slotsHtml}</div>
                </div>`;
        }
        document.getElementById('cowsList').innerHTML = html;

        // Admin Table Logic
        let tHtml = "";
        bookings.forEach(b => {
            tHtml += `
                <tr>
                    <td><strong>${b.name}</strong></td>
                    <td class="small">${b.phone}</td>
                    <td><span class="badge bg-danger rounded-pill">${b.qty}</span></td>
                    <td>
                        ${b.status === 'booked' 
                            ? `<button onclick="confirmPaid(${b.id})" class="btn btn-sm btn-gold">Confirm Payment</button>`
                            : `<span class="text-success fw-bold"><i class="fas fa-check-double"></i> Paid</span>`}
                    </td>
                </tr>`;
        });
        document.getElementById('adminTable').innerHTML = tHtml;
    }

    render();
</script>

</body>
</html>
